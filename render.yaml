services:
  - type: web
    name: octoscale-web
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 8000
      - key: BASE_URL
        value: https://octoscale-web.onrender.com # Change this to your final Render web URL once deployed
      - key: DATABASE_URL
        fromDatabase:
          name: octoscale-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: octoscale-redis
          property: connectionString

  - type: keyvalue
    name: octoscale-redis
    plan: free
    ipAllowList: [] # Restricts access to internal network only for security

databases:
  - name: octoscale-db
    plan: free
